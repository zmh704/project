<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zmh704 项目导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .project-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-color: rgba(102,126,234,0.3);
        }
        .project-card h3 {
            color: #fff;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }
        .project-card p {
            color: #999;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            background: rgba(102,126,234,0.2);
            color: #667eea;
        }
        .section-title {
            font-size: 1.1rem;
            color: #aaa;
            margin: 2rem 0 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }
        footer a { color: #667eea; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0 2rem;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .github-link:hover { color: #fff; }
        .github-link svg { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 zmh704 / Project</h1>
        <p class="subtitle">GitHub 项目导航 · 数据可视化工具集</p>

        <a class="github-link" href="https://github.com/zmh704" target="_blank">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            github.com/zmh704
        </a>

        <div class="section-title">📊 数据分析</div>
        <div class="project-grid">
            <a class="project-card" href="https://zmh704.github.io/sector-flow-analysis/" target="_blank">
                <h3>📈 A股板块资金流向分析</h3>
                <p>A股行业和概念板块资金流向可视化分析工具，支持多日数据对比和趋势分析。</p>
                <div class="badge">sector-flow-analysis</div>
            </a>
        </div>

        <div class="section-title">🔧 其他项目</div>
        <div class="project-grid">
            <div class="project-card" style="cursor:default;opacity:0.6">
                <h3>🛠️ 更多项目开发中...</h3>
                <p>更多工具和应用即将上线，敬请期待。</p>
            </div>
        </div>

        <footer>
            <p>Powered by <a href="https://github.com/zmh704">zmh704</a> · 2026</p>
        </footer>
    </div>
</body>
</html>
